<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebDev Week 2 - Interactivity</title>
    <link rel="stylesheet" href="week2.css">
</head>
<body>
    <!-- Decorative Elements -->
    <div class="decor decor-light">
        <span class="butterfly b1">🦋</span>
        <span class="butterfly b2">🦋</span>
        <span class="butterfly b3">🦋</span>
    </div>

    <div class="decor decor-dark">
        <span class="star s1">★</span>
        <span class="star s2">★</span>
        <span class="star s3">★</span>
        <span class="star s4">★</span>
    </div>

    <div class="container">
        <!-- Icon Toggle -->
        <button id="theme-toggle" class="icon-toggle" aria-label="Toggle theme">
            <span class="sun">☀️</span>
            <span class="moon">🌙</span>
        </button>

        <h1>Contact Us</h1>

        <div id="success-message" class="success-msg hidden">
            Thank you! Your message has been sent successfully.
        </div>

        <form id="contact-form">
            <div class="form-group">
                <input type="text" id="name" placeholder=" " />
                <label for="name">Name</label>
                <p class="error" id="name-error"></p>
            </div>

            <div class="form-group">
                <input type="email" id="email" placeholder=" " />
                <label for="email">Email</label>
                <p class="error" id="email-error"></p>
            </div>

            <div class="form-group">
                <textarea id="message" rows="5" placeholder=" "></textarea>
                <label for="message">Message</label>
                <p class="error" id="message-error"></p>
            </div>

            <button type="submit" class="submit-btn">Submit</button>
        </form>
    </div>

    <script src="week2.js"></script>
</body>
</html>
